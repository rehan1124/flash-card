name: E2E Tests (Chromium)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  playwright-tests:
    name: Playwright shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (shard)
        run: npx playwright test --project=chromium --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: 'true'

      - name: Upload blob report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1
          if-no-files-found: error

      - name: Upload test results (traces, videos, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-shard-${{ matrix.shardIndex }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

  merge-reports:
    name: Merge Playwright reports
    if: ${{ !cancelled() }}
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download blob report artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge blob reports into HTML
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged Playwright HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-attempt-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 14
